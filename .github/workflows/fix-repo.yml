name: Fix Repository

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  fix-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Lockfile
        run: npm install --package-lock-only

      - name: Commit Lockfile
        run: |
          git config --global user.email "natasha@fluiditymarine.com"
          git config --global user.name "Natasha (Recovery Agent)"
          git add package-lock.json
          git commit -m "chore: generate fresh package-lock.json" || echo "No changes"
          git push origin master
